analytics_layer_cake:
  - name: Data Sources
    description: Systems that generate raw data.
    children:
      - name: Operational Databases
        description: Databases that power live applications and store transactional data used to run the business in real time.
        children:
          - name: Postgres
            description: An open-source relational database widely used for transactional workloads, application backends, and as a primary system of record for structured data.

          - name: MySQL
            description: A popular open-source relational database optimized for web applications and high-volume transactional systems.

          - name: SQL Server
            description: Microsoft’s enterprise relational database used for mission-critical business applications, reporting systems, and transactional workloads.

          - name: Oracle
            description: A high-performance enterprise relational database commonly used for large-scale, mission-critical transactional systems in regulated and complex environments.

      - name: SaaS Applications
        description: Cloud software systems that hold business data such as customers, billing, and support.
        children:
          - name: Salesforce
            description: A cloud-based CRM platform that manages customer accounts, sales pipelines, support interactions, and related business data used for revenue and customer analytics.

          - name: Stripe
            description: A payments and billing platform that processes online transactions and emits detailed financial, customer, and event data for revenue, usage, and fraud analytics.

          - name: Zendesk
            description: A customer support platform that captures tickets, conversations, and resolution metadata used for support operations and customer experience analytics.

          - name: HubSpot
            description: A marketing, sales, and CRM platform that tracks leads, campaigns, customer interactions, and funnel metrics for growth and lifecycle analytics.

      - name: Event and Log Sources
        description: Systems that generate high-volume streams of behavioral events and technical logs from applications, devices, and infrastructure.
        children:
          - name: Segment
            description: A customer data platform that collects, validates, and routes product and customer events from applications to analytics, marketing, and data warehouse destinations.
          - name: RudderStack
            description: An open-core event pipeline and customer data platform that routes application events into data warehouses, product analytics, and downstream tools with a warehouse-first architecture.
          - name: Application Logs
            description: Machine-generated records from applications and services that capture errors, performance metrics, and operational behavior for debugging, monitoring, and reliability analysis.
          - name: IoT Devices
            description: Physical devices and sensors that continuously emit telemetry, measurements, and status updates as event streams for monitoring, analytics, and automation.

  - name: Ingestion
    description: Tools that extract data from data sources and load it into the data stack.
    children:
      - name: Batch ELT and Replication
        description: Systems that periodically copy data from source databases and SaaS applications into warehouses or data lakes, usually loading raw data and transforming it later.
        children:
          - name: Fivetran
            description: A fully managed ELT service focused on reliable, low-ops replication of databases and SaaS sources into analytics systems.

          - name: Airbyte
            description: An open and extensible ELT platform that prioritizes flexibility and custom connectors, with options for self-hosting or managed deployment.

          - name: Stitch
            description: A lightweight, SaaS-based ELT tool optimized for fast setup and simple data replication for small to mid-sized teams.

      - name: Streaming Ingestion
        description: Platforms that ingest and distribute continuous streams of events and messages in near real time.
        children:
          - name: Apache Kafka
            description: The gold standard. An OSS distributed event streaming platform used to collect, buffer, and distribute high-throughput event and log data.

          - name: Confluent
            description: Kafka as a service.

          - name: Apache Pulsar
            description: An open source alternative to Kafka with better replication and less mindshare

      - name: Change Data Capture
        description: Technologies that monitor databases for inserts, updates, and deletes and stream those changes to downstream systems in real time.
        children:
          - name: Debezium
            description: An open-source change data capture platform that streams database changes from systems like Postgres and MySQL into Kafka and other downstream consumers.
          - name: Neon
            description: Databricks' serverless, Postgres-compatible operational database; often paired with WAL-based CDC to stream row-level changes into analytics and AI systems. 


  - name: Storage Layer
    description: Storing structured and semi-structured data for efficient querying.
    layout: stack
    children:

      - name: Data Storage
        description: Platforms that persist large volumes of analytical data and provide compute or interfaces for querying it.
        children:
          - name: Object Storage
            description: Low-cost, scalable storage for binary data.
            children:
              - name: Amazon S3
                description: The de facto standard API for object storage.

              - name: Azure Data Lake Storage
                description: Microsoft’s object storage.

              - name: Google Cloud Storage
                description: Google’s version.

              - name: MinIO
                description: An open-source clone of Amazon S3, often used on-prem.

          - name: Cloud Data Warehouses
            description: Fully managed databases designed for fast SQL analytics over structured and semi-structured data.
            children:
              - name: Snowflake
                description: A cloud-native data warehouse that separates storage and compute, enabling elastic scaling and high-performance SQL analytics.

              - name: BigQuery
                description: Google Cloud’s serverless data warehouse that runs SQL queries over massive datasets without requiring infrastructure management.

              - name: Amazon Redshift
                description: AWS’s cloud data warehouse optimized for large-scale analytical workloads using SQL.

              - name: Azure Synapse
                description: Microsoft’s analytics service that combines data warehousing, big data processing, and SQL analytics in a single platform.

          - name: Lakehouse Platforms
            description: Platforms that combine object storage, open table formats, and SQL or Spark-based compute into a unified analytics system.
            children:
              - name: Databricks
                description: A lakehouse platform built on Apache Spark and Delta Lake for data engineering, analytics, and machine learning on object storage.

              - name: Dremio
                description: A lakehouse query engine and platform optimized for fast SQL queries over data stored in object storage and open table formats.

              - name: Starburst
                description: An enterprise lakehouse analytics platform built around Trino for querying data across object storage and external systems.

      - name: File Formats
        description: How data is stored on disk for efficient access.
        children:
          - name: Parquet
            description: A column oriented format, widely used for lake houses.

          - name: ORC
            description: A legacy column oriented format. 

          - name: Avro
            description: A row-oriented format used for streaming and CDC.

      - name: Table Formats
        description: Metadata layers that organize files into transactional tables with schema, versioning, and ACID-like guarantees.
        children:
          - name: Apache Iceberg
            description: Widely supported, optimized for reads and appends.

          - name: Delta Lake
            description: Databricks native format

          - name: Apache Hudi
            description: Optimized for CDC and upserts.

  - name: Transformation 
    description: Processes that clean, join, validate, and shape raw data into analytics-ready tables.
    children:
      - name: Distributed Processing
        description: Engines for large-scale batch and streaming transformations that require distributed compute.
        children:
          - name: Apache Spark
            description: Optimized for throughput over latency, typically used for batch and high latency streaming (>10 seconds).
          - name: Apache Flink
            description: Optimized for latency over throughput, typically used for low latency streaming.

      - name: Orchestration 
        description: Systems that coordinate and monitor data pipelines, ensuring tasks run in the correct order and recover from failures.
        children:
          - name: dbt
            description: SQL-based extract-load-transform framework for building, testing, versioning, and orchestrating analytics model.

          - name: Airflow
            description: A scheduler-first solution

          - name: Dagster
            description: Data-asset–centric and type-aware pipelines

          - name: Prefect
            description: Developer-first and Python-oriented

  - name: Query and Compute
    description: Engines that execute SQL queries over data stored in warehouses, lakes, and lakehouse platforms.
    children:
      - name: Distributed SQL Engines
        description: Scalable SQL engines designed to query large datasets across clusters of machines, often directly over object storage.
        children:
          - name: Trino
            description: An open-source distributed SQL query engine optimized for interactive analytics across multiple data sources and object storage.

          - name: Presto
            description: A high-performance distributed SQL engine originally developed at Facebook for querying large datasets across heterogeneous data systems.

      - name: Warehouse and Lakehouse SQL
        description: SQL engines that are tightly integrated into managed data warehouse and lakehouse platforms.
        children:
          - name: Snowflake
            description: A fully managed cloud data warehouse that provides elastic compute and SQL analytics over centrally managed data.

          - name: Databricks SQL
            description: The SQL analytics engine of the Databricks Lakehouse, optimized for querying Delta Lake tables stored on object storage.

          - name: BigQuery
            description: Google Cloud’s serverless data warehouse that executes SQL queries over large-scale datasets stored in managed and external tables.

          - name: Redshift
            description: Amazon’s cloud data warehouse designed for running SQL analytics over large structured and semi-structured datasets.

          - name: ClickHouse
            description: A vertically integrated analytical database that ingests, stores, and queries data using its own columnar storage and vectorized SQL engine, designed for low-latency analytics on large volumes of event and log data.

      - name: Embedded Analytics Engines
        description: Lightweight, high-performance databases that can be embedded in applications or used locally to analyze files and small to medium datasets.
        children:
          - name: DuckDB
            description: An in-process analytical database designed for fast SQL queries over local files such as Parquet and CSV, commonly used for data science and embedded analytics.


  - name: Analytics
    description: Tools that deliver analytics to people and operational systems.
    children:
      - name: Business Intelligence 
        description: Dashboards and visualizations.
        children:
          - name: Tableau
            description: A widely used BI platform for interactive dashboards, visual analytics, and business reporting.

          - name: Power BI
            description: Microsoft’s business intelligence platform for data modeling, dashboards, and enterprise reporting.

          - name: Looker
            description: A BI platform with a built-in semantic model that provides governed, consistent metrics for dashboards and analysis.

          - name: Qlik
            description: A data analytics and visualization platform focused on associative, in-memory exploration.

          - name: ThoughtSpot
            description: A search-driven and AI-powered BI platform designed for self-service analytics.

      - name: Data Apps
        description: Custom apps for end users.
        children:
          - name: Databricks Apps
            description: A platform for hosting Python and JavaScript data applications directly on the Databricks Lakehouse.

          - name: Streamlit in Snowflake
            description: Snowflake’s integrated Streamlit environment for building and hosting Python-based data applications.

          - name: Posit Connect
            description: An enterprise platform for deploying R and Python data applications on-premises or in private clouds.

          - name: Plotly Dash Enterprise
            description: A platform for deploying production-grade Python analytical web applications.

          - name: Replit
            description: A cloud-based development and hosting environment for building and running Python and JavaScript data applications.

      - name: Notebooks
        description: Tools for exploratory data analysis.
        children:
          - name: Jupyter
            description: An open-source notebook environment for running Python, SQL, and R for data exploration and analysis.

          - name: Databricks Notebooks
            description: Integrated notebook environment for running SQL and Python directly on the Databricks Lakehouse.

          - name: Hex
            description: A collaborative data notebook platform designed for analytics, data science, and stakeholder reporting.

          - name: Deepnote
            description: A cloud-based notebook environment focused on collaboration and data team workflows.

          - name: Google Colab
            description: A hosted Jupyter notebook service for running Python notebooks in the cloud.

      - name: Reverse ETL
        description: Pushing data back into operational tools.
        children:
          - name: Hightouch
            description: A reverse ETL platform that syncs data from warehouses into SaaS tools such as Salesforce, HubSpot, and Braze.

          - name: Census
            description: A reverse ETL platform that maps warehouse data into operational systems for sales, marketing, and growth teams.

          - name: Polytomic
            description: An enterprise-focused reverse ETL platform for syncing analytics data into business applications.

          - name: RudderStack
            description: A customer data platform that supports both event routing and warehouse-to-SaaS data activation.

      - name: Semantic Layer
        description: Business-facing definitions of metrics and dimensions that ensure consistent meaning across analytics tools, dashboards, and users.
        children:
          - name: BI Semantic Models
            description: Semantic layers built into BI tools that define metrics, dimensions, and relationships for dashboards and reports.
            children:
              - name: Looker
                description: A BI platform with a built-in modeling language that defines metrics and dimensions as governed data models for consistent analytics.

              - name: Power BI
                description: Microsoft’s business intelligence platform that includes a semantic model for defining measures, relationships, and business logic.

          - name: Standalone Metrics Layers
            description: Dedicated systems that define and serve consistent metrics to multiple analytics and operational tools.
            children:
              - name: dbt Semantic Layer
                description: A metrics and semantic framework built on top of dbt models that exposes consistent business metrics to BI tools and applications.

              - name: Cube
                description: A headless semantic layer that provides a unified metrics API for serving analytics to dashboards, applications, and embedded use cases.

  - name: Catalogs
    description: Catalogs are about discovery, access control, lineage, and governance.
    children:
      - name: Enterprise Catalogs
        description: Optimized for governance and control.
        children:
          - name: Collibra
            description: Governance, policy, and stewardship first.

          - name: Alation
            description: Analytics discovery with enterprise guardrails.

          - name: Informatica
            description: End-to-end data management suite.

      - name: Modern Catalogs
        description: Optimized for discovery and inferred metadata from usage.
        children:
          - name: Atlan
            description: Collaboration over governance.

      - name: Integrated Catalogs
        description: Optimized for governance and access enforcement within one platform.
        children:
          - name: AWS Glue
            description: A lightweight table and schema registry.

          - name: Microsoft Purview
            description: Enterprise governance and compliance.

          - name: Google Dataplex
            description: Governance for GCS and BigQuery.

          - name: Databricks Unity Catalog
            description: Access control and lineage for all Databricks workloads.

